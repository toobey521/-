// 初始化表格
function initTable() {
    const top30Body = document.getElementById('top30-body');
    const allBody = document.getElementById('all-body');
    
    // TOP30：按得分排序，严格只取前30个
    const scored = stocks.filter(s => s.score > 0);
    scored.sort((a, b) => b.score - a.score);
    const top30 = scored.slice(0, 30);
    
    top30Body.innerHTML = top30.map((s, i) => {
        const cls = s.change_pct > 0 ? 'up' : s.change_pct < 0 ? 'down' : 'neutral';
        const sign = s.change_pct > 0 ? '+' : '';
        const features = s.features ? s.features.replace(/流通/g, '市值').split('+').map(f => '<span class="feature-tag">' + f + '</span>').join(' ') : '-';
        return '<tr data-code="' + s.code + '">' +
            '<td>' + (i+1) + '</td>' +
            '<td>' + s.code + '</td>' +
            '<td><b>' + s.name + '</b></td>' +
            '<td class="price-cell ' + cls + '" id="price-top30-' + s.code + '">' + s.price.toFixed(2) + '</td>' +
            '<td class="change-cell ' + cls + '" id="change-top30-' + s.code + '">' + sign + s.change_pct.toFixed(2) + '%</td>' +
            '<td class="sector">' + (s.sector || '-') + '</td>' +
            '<td class="score">' + s.score + '</td>' +
            '<td class="features">' + features + '</td></tr>';
    }).join('');
    
    // 第二页：3200多只全覆盖，按得分排序
    const allSorted = scored.sort((a, b) => b.score - a.score);
    allBody.innerHTML = allSorted.map((s, i) => {
        const cls = s.change_pct > 0 ? 'up' : s.change_pct < 0 ? 'down' : 'neutral';
        const sign = s.change_pct > 0 ? '+' : '';
        const features = s.features ? s.features.replace(/流通/g, '市值').split('+').map(f => '<span class="feature-tag">' + f + '</span>').join(' ') : '-';
        return '<tr data-code="' + s.code + '">' +
            '<td>' + (i+1) + '</td>' +
            '<td>' + s.code + '</td>' +
            '<td><b>' + s.name + '</b></td>' +
            '<td class="price-cell ' + cls + '" id="price-all-' + s.code + '">' + s.price.toFixed(2) + '</td>' +
            '<td class="change-cell ' + cls + '" id="change-all-' + s.code + '">' + sign + s.change_pct.toFixed(2) + '%</td>' +
            '<td class="sector">' + (s.sector || '-') + '</td>' +
            '<td class="score">' + s.score + '</td>' +
            '<td class="features">' + features + '</td></tr>';
    }).join('');
}

function updateTable() {
    const timeEl = document.getElementById('time');
    
    const symbols = stocks.map(s => (s.code.startsWith('6') ? 'sh' : 'sz') + s.code).join(',');
    fetch('http://qt.gtimg.cn/q=' + symbols)
        .then(r => r.text())
        .then(text => {
            const lines = text.trim().split('\n');
            const updates = {};
            lines.forEach(line => {
                if (!line.includes('=')) return;
                const [, data] = line.split('=');
                const f = data.trim().split('~');
                if (f.length < 49) return;
                const code = f[2];
                updates[code] = {
                    price: parseFloat(f[3]),
                    change_pct: parseFloat(f[31]),
                    float_cap_yi: parseFloat(f[45]) || 0
                };
            });
            
            const allPriceCells = document.querySelectorAll('.price-cell');
            const allChangeCells = document.querySelectorAll('.change-cell');
            
            allPriceCells.forEach(el => el.className = 'price-cell');
            allChangeCells.forEach(el => el.className = 'change-cell');
            
            Object.keys(updates).forEach(code => {
                const u = updates[code];
                if (!u) return;
                
                const cls = u.change_pct > 0 ? 'up' : u.change_pct < 0 ? 'down' : 'neutral';
                const sign = u.change_pct > 0 ? '+' : '';
                
                const priceEl = document.getElementById('price-top30-' + code);
                const changeEl = document.getElementById('change-top30-' + code);
                if (priceEl) {
                    priceEl.textContent = u.price.toFixed(2);
                    priceEl.className = 'price-cell ' + cls;
                }
                if (changeEl) {
                    changeEl.textContent = sign + u.change_pct.toFixed(2) + '%';
                    changeEl.className = 'change-cell ' + cls;
                }
                
                const priceEl2 = document.getElementById('price-all-' + code);
                const changeEl2 = document.getElementById('change-all-' + code);
                if (priceEl2) {
                    priceEl2.textContent = u.price.toFixed(2);
                    priceEl2.className = 'price-cell ' + cls;
                }
                if (changeEl2) {
                    changeEl2.textContent = sign + u.change_pct.toFixed(2) + '%';
                    changeEl2.className = 'change-cell ' + cls;
                }
            });
            
            timeEl.textContent = new Date().toLocaleString('zh-CN');
        })
        .catch(e => {
            console.error('更新失败:', e);
        });
}

function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    if (tab === 'top30') {
        document.getElementById('top30').classList.remove('hidden');
        document.getElementById('all').classList.add('hidden');
    } else {
        document.getElementById('top30').classList.add('hidden');
        document.getElementById('all').classList.remove('hidden');
    }
}

initTable();
updateTable();
setInterval(updateTable, 3000);
</script>
